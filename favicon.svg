<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Trajectory A (blue memory decay) -->
  <path d="
      M40 220
      C 80 80,   180 80,   220 220
      S 140 360, 40 220
      C 20 180,  60 140,   130 130
      S 240 120, 200 60
      C 160 10,  80 20,    60 80
      S 20 160,  40 220
    "
    stroke="url(#gradA)" 
    stroke-width="6" 
    fill="none" 
    stroke-linecap="round" 
    opacity="0.9"
  />

  <!-- Trajectory B (orange memory decay) -->
  <path d="
      M40 40
      C 120 180, 140 180, 220 40
      S 140 -100, 40 40
      C 10 80,   40 140,   120 150
      S 260 160, 200 220
      C 140 280, 60 260,   40 200
      S 10 120,  40 40
    "
    stroke="url(#gradB)" 
    stroke-width="6" 
    fill="none" 
    stroke-linecap="round" 
    opacity="0.9"
  />

  <!-- Gradients for memory decay -->
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a3d91" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#3f8fe8" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#8fc7ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d9efff" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="gradB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#b34700" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#ff9a4d" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#ffd1a3" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff0e0" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

</svg>
