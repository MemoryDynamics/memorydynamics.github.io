<!-- Two trajectory knot -->
<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Trajectory 1 -->
  <path d="M20 140 C60 40, 120 40, 160 140" 
        stroke="#111" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Trajectory 2 -->
  <path d="M20 40 C60 140, 120 140, 160 40" 
        stroke="#111" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Memory decay markers -->
  <circle cx="60" cy="90" r="6" fill="#111" opacity="0.7"/>
  <circle cx="120" cy="90" r="6" fill="#111" opacity="0.5"/>
</svg>
