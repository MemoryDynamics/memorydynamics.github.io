<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">

  <!-- Trajectory A (blue-ish memory decay) -->
  <path d="M40 180 
           C 80 40, 140 40, 180 180
           S 80 300, 40 180"
        stroke="url(#gradA)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Trajectory B (orange-ish memory decay) -->
  <path d="M40 40
           C 100 180, 120 180, 180 40
           S 120 -80, 40 40"
        stroke="url(#gradB)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Gradients for memory decay -->
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3d91" stop-opacity="1"/>
      <stop offset="60%" stop-color="#4fa3ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#bfe0ff" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="gradB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b34700" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ff9a4d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffe0c2" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

</svg>
