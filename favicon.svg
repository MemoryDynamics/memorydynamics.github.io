<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="260" height="260" fill="#000"/>

  <!-- Trajectory A (forms the left part of an M) -->
  <path d="
      M50 210
      C 70 80,   110 80,   130 210
      S 190 340, 210 210
    "
    stroke="url(#gradA)" 
    stroke-width="7" 
    fill="none" 
    stroke-linecap="round" 
    opacity="0.9"
  />

  <!-- Trajectory B (forms a D-like loop, interacting with A) -->
  <path d="
      M210 50
      C 140 40,  100 80,  100 130
      C 100 180, 140 220, 210 210
      C 260 160, 260 100, 210 50
    "
    stroke="url(#gradB)" 
    stroke-width="7" 
    fill="none" 
    stroke-linecap="round" 
    opacity="0.9"
  />

  <!-- Gradients for memory decay -->
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4fa3ff" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#8fc7ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d9efff" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="gradB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ff9a4d" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#ffd1a3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff0e0" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

</svg>
