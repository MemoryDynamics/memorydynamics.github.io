<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Background: from nothing -->
  <rect width="260" height="260" fill="#000"/>

  <!-- Trajectory A (left, M-like, knotty) -->
  <path d="
      M40 210
      C 60 90,   90 70,   115 140
      S 150 220, 180 150
      C 200 110, 170 80,  140 95
      S 90 130,  70 80
      C 55 45,   45 60,   40 90
      S 35 160,  40 210
    "
    stroke="url(#gradA)"
    stroke-width="7"
    fill="none"
    stroke-linecap="round"
    opacity="0.95"
  />

  <!-- Trajectory B (right, D-like loop, interacting) -->
  <path d="
      M210 50
      C 150 40,  115 70,  115 120
      C 115 170, 150 205, 210 210
      C 250 180, 250 110, 210 80
      C 190 65,  165 70,  150 90
      C 135 110, 135 135, 150 150
    "
    stroke="url(#gradB)"
    stroke-width="7"
    fill="none"
    stroke-linecap="round"
    opacity="0.95"
  />

  <!-- Gradients: memory decay -->
  <defs>
    <linearGradient id="gradA" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4fa3ff" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#8fc7ff" stop-opacity="0.7"/>
      <stop offset="80%"  stop-color="#c7e2ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8f3ff" stop-opacity="0.22"/>
    </linearGradient>

    <linearGradient id="gradB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ff9a4d" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#ffc28a" stop-opacity="0.7"/>
      <stop offset="80%"  stop-color="#ffe0c2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff3e5" stop-opacity="0.22"/>
    </linearGradient>
  </defs>

</svg>
